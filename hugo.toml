baseURL = "https://twishabansal.github.io/"
languageCode = "en-us"
title = "Twisha Bansal"
theme = "PaperMod"

enableRobotsTXT = true
enableEmoji = true
pygmentsUseClasses = true

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.profileMode]
    enabled = true
    title = "Hi, I'm Twisha 👋"
    subtitle = "Engineer at Google working on AI tooling and MCP Toolbox for Databases. I write about databases, agent tooling, and shipping developer experiences that help LLMs talk to data."

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "Tags"
      url = "/tags/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/twishabansal"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/twishabansal/"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
